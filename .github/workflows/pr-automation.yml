name: PR Automation - Quality Gates

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  quality-gates:
    name: Quality Gate Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck
        continue-on-error: false

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run test suite
        run: npm test -- --coverage
        continue-on-error: false

      - name: Build project
        run: npm run build
        continue-on-error: false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  pr-status-check:
    name: PR Status Summary
    needs: quality-gates
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.quality-gates.result }}" == "success" ]; then
            echo "✅ All quality gates passed"
            exit 0
          else
            echo "❌ Quality gates failed"
            exit 1
          fi

  pr-comment:
    name: Add PR Comment
    needs: quality-gates
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR - Success
        if: needs.quality-gates.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Quality Gates Passed**\n\n- ✅ TypeScript: 0 errors\n- ✅ ESLint: Passed\n- ✅ Tests: All passing\n- ✅ Build: Successful\n\nReady for review and merge.'
            })

      - name: Comment on PR - Failure
        if: needs.quality-gates.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Quality Gates Failed**\n\nPlease fix the issues and push updates:\n- Check TypeScript errors\n- Fix ESLint violations\n- Ensure all tests pass\n- Verify build succeeds'
            })
