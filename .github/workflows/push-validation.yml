name: Push Validation - Master Branch

on:
  push:
    branches:
      - master
      - main

jobs:
  validate-push:
    name: Validate Push to Master
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Generate build summary
        if: always()
        run: |
          echo "## Master Branch Validation ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TypeScript: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tests: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build: Successful" >> $GITHUB_STEP_SUMMARY
